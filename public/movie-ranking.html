<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Ranking</title>
    <link rel="stylesheet" href="../public/css/movie-review.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="page">
      <nav>
        <div>
          <i class="fa-solid fa-th-large"></i>
          <p>All</p>
        </div>
        <div>
          <i class="fa-solid fa-film"></i>
          <p>Movies</p>
        </div>
        <div>
          <i class="fa-solid fa-tv"></i>
          <p>TV Shows</p>
        </div>
        <div>
          <i class="fa-solid fa-microphone"></i>
          <p>Podcasts</p>
        </div>
        <div>
          <i class="fa-solid fa-arrow-down-a-z"></i>
          <p>Alphabetical</p>
        </div>
        <div>
          <i class="fa-solid fa-arrow-down-1-9"></i>
          <p>Rating</p>
        </div>
        <div>
          <i class="fa-solid fa-arrow-down-wide-short"></i>
          <p>Release Date</p>
        </div>
      </nav>
      <div class="main-container">
        <main>
          <section>
            <div class="movie-card">
            
              <div class="movie-poster">
                <img src="../assets/images/movie-ranking-project/Aadu3/Aadu 3.png" alt="Aadu 3" />
              </div>
              <div class="movie-details-right-pane">

                <div class="movie-details">
                <h2>Aadu 3</h2>
                <p>
                  2026 MALAYALAM
                  <span class="hd-band">HD</span>
                </p>
                <div class="poster-nav">
                  <i class="fa-regular fa-calendar-plus">
                    <span>3 weeks ago</span></i>
                  <i class="fa-solid fa-award"> <span>42</span> </i>
                  <i class="fa-regular fa-comments"> <span>13</span> </i>
                </div>
                <ul class="rating-section">
                  <li>
                    <label for="action">Action</label>
                    <p class="rating-fig">4.5</p>
                    <i class="fa-solid fa-star rating-fig"></i>
                    <div class="rating-box">
                      <span class="rating-fill" style="width: 90%"></span>
                    </div>
                  </li>
                  <li>
                    <label for="action">Comedy</label>
                    <p class="rating-fig">3.0</p>
                    <i class="fa-solid fa-star rating-fig"></i>
                    <div class="rating-box">
                      <span class="rating-fill" style="width: 50%"></span>
                    </div>
                  </li>
                  <li>
                    <label for="action">Romance</label>
                    <p class="rating-fig">1.0</p>
                    <i class="fa-solid fa-star rating-fig"></i>
                    <div class="rating-box">
                      <span class="rating-fill" style="width: 10%"></span>
                    </div>
                  </li>
                  <li>
                    <label for="action">Storyline</label>
                    <p class="rating-fig">2.3</p>
                    <i class="fa-solid fa-star rating-fig"></i>
                    <div class="rating-box">
                      <span class="rating-fill" style="width: 30%"></span>
                    </div>
                  </li>
                  <li>
                    <label for="action">Performance</label>
                    <p class="rating-fig">4.7</p>
                    <i class="fa-solid fa-star rating-fig"></i>
                    <div class="rating-box">
                      <span class="rating-fill" style="width: 92.3%"></span>
                    </div>
                  </li>
                </ul>
              </div>

              <div class="add-details">
                <i class="fa-solid fa-bars"> <span>Wiki</span></i>
                <i class="fa-solid fa-tv"> <span>Trailer</span></i>
                <button class="watch-btn">Watch</button>
              </div>

              <div class="actor-section-slider">
                <div class="actor-card">
                  <img
                    src="../assets/images/movie-ranking-project/Aadu3/Aadu3-actors/Jayasurya.png"
                    alt="actor1"
                  />
                  <div class="actor-details">
                    <p>Jayasurya <br /><span>Leading Actor</span></p>
                  </div>
                </div>
              </div>

              </div>
              
            </div>
          </section>
          <aside></aside>
        </main>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
