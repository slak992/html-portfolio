<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../public/css/birthday-invite.css" />
    <title>Birthday Invite</title>
  </head>
  <body>
    <div class="main-container">
      <header>
        <h1>Birthday Invite</h1>
      </header>
      <main>
        <h2>You're invited to my birthday party!</h2>
        <img src="../assets/images/birthday-party-invitation-project/birthday-party.png" alt="Birthday Cake" />
        <div class="event-details">
          <div class="date-detail">
            <img src="../assets/images/birthday-party-invitation-project/calender.png" alt="Calendar Icon" class="event-icon"/>
            <p>Date: June 30, 2024</p>
          </div>
          <div class="time-detail">
            <img src="../assets/images/birthday-party-invitation-project/time.png" alt="Clock Icon" class="event-icon"/>
            <p>Time: 7:00 PM</p>
          </div>
          <div class="location-detail">
            <img src="../assets/images/birthday-party-invitation-project/map.png" alt="Location Icon" class="event-icon"/>
            <p>Location: 123 Party Lane,
                <br/> Fun City</p>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
